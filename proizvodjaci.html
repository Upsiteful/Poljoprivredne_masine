<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro Trgovina | Proizvođači</title>
  <style>
    :root{--green:#18833b;--blue:#153b57;--bg:#efefef;--shadow:0 8px 20px rgba(0,0,0,.08);--container:min(1180px,92vw)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#222}a{text-decoration:none;color:inherit}.wrap{width:var(--container);margin:0 auto}
    .top{background:#fff;padding:10px 0;border-bottom:1px solid #e7e7e7}.row{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;font-size:18px}.social{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--green);color:#fff;border-radius:50%;font-weight:700}.header{background:var(--green);position:sticky;top:0}.header .wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:16px}.brand{display:flex;align-items:center;gap:14px;color:#fff}.brand-name{font-size:40px;font-weight:700}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#fff;padding:14px 22px;border:2px solid rgba(255,255,255,.35);border-radius:12px;font-size:19px;font-weight:700}
    .hero{background:linear-gradient(rgba(21,59,87,.92),rgba(21,59,87,.92));color:#fff;padding:40px 0}.hero h1{margin:0;font-size:clamp(32px,5vw,54px)}.hero p{font-size:20px;color:#dbe7ee;margin:10px 0 0}
    .section{padding:40px 0}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.card{background:#fff;border-radius:20px;padding:20px;border:1px solid #ddd;box-shadow:var(--shadow)}.card img{width:100%;height:220px;object-fit:contain;background:#fafafa;border-radius:14px}.card h3{text-align:center;font-size:28px;margin:16px 0 10px}.card p{text-align:center;font-size:18px;line-height:1.5;color:#666;margin:0 0 14px}.btn{display:block;text-align:center;background:var(--green);color:#fff;padding:16px;border-radius:12px;font-size:22px;font-weight:700}.back{display:inline-block;margin-bottom:22px;background:#fff;padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);font-weight:700}.floating-call{position:fixed;right:16px;bottom:16px;width:76px;height:76px;border-radius:22px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:38px;box-shadow:0 12px 24px rgba(0,0,0,.22)}
    @media (max-width:960px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.brand-name{font-size:30px}}
    @media (max-width:720px){.header .wrap{flex-direction:column;align-items:flex-start}.nav{width:100%}.nav a{flex:1;text-align:center}.brand-name{font-size:28px}.grid{grid-template-columns:1fr}.card h3{font-size:24px}}
  </style>
</head>
<body>
  <div class="top"><div class="wrap"><div class="row"><a href="tel:+38160111222">📞 +381 60 111 222</a><a href="mailto:info@agrotrgovina.rs">✉ info@agrotrgovina.rs</a><a class="social" href="https://facebook.com" target="_blank" rel="noopener">f</a></div></div></div>
  <header class="header"><div class="wrap"><a href="index.html" class="brand"><span style="font-size:32px">⌂</span><span class="brand-name">Meni</span></a><nav class="nav"><a href="index.html">Glavna</a><a href="kontakt.html">Kontakt</a></nav></div></header>
  <section class="hero"><div class="wrap"><h1 id="title">Proizvođači</h1><p>Prikaz istog dela od različitih proizvođača koje vlasnik ima u ponudi.</p></div></section>
  <section class="section"><div class="wrap"><a class="back" href="javascript:history.back()">← Nazad</a><div class="grid" id="grid"></div></div></section>
  <a class="floating-call" href="tel:+38160111222">📞</a>
  <script>
    const qs = new URLSearchParams(location.search);
    const masina = qs.get('masina') || 'plug';
    const deo = qs.get('deo') || 'Raonik';
    document.getElementById('title').textContent = `${deo} — dostupni proizvođači`;
    const manufacturers = [
      {name:'Bellota', note:'Pouzdan kvalitet i odlična trajnost.', img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=900&q=80'},
      {name:'Kverneland', note:'Traženi rezervni delovi za intenzivan rad.', img:'https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=900&q=80'},
      {name:'OEM varijanta', note:'Povoljnija opcija za standardnu upotrebu.', img:'https://images.unsplash.com/photo-1592982537447-6f2a6a0f3b2d?auto=format&fit=crop&w=900&q=80'}
    ];
    document.getElementById('grid').innerHTML = manufacturers.map(item => `
      <article class="card">
        <img src="${item.img}" alt="${item.name}">
        <h3>${item.name}</h3>
        <p>${item.note}<br><strong>Mašina:</strong> ${masina}<br><strong>Deo:</strong> ${deo}</p>
        <a class="btn" href="kontakt.html">Pošalji upit</a>
      </article>
    `).join('');
  </script>
</body>
</html>
