<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro Trgovina | Pretraga</title>
  <style>
    :root{--green:#18833b;--blue:#153b57;--bg:#efefef;--shadow:0 8px 20px rgba(0,0,0,.08);--container:min(1180px,92vw)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#222}a{text-decoration:none;color:inherit}.wrap{width:var(--container);margin:0 auto}
    .top{background:#fff;padding:10px 0;border-bottom:1px solid #e7e7e7}.row{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;font-size:18px}.social{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--green);color:#fff;border-radius:50%;font-weight:700}.header{background:var(--green);position:sticky;top:0}.header .wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:16px}.brand{display:flex;align-items:center;gap:14px;color:#fff}.brand-name{font-size:40px;font-weight:700}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#fff;padding:14px 22px;border:2px solid rgba(255,255,255,.35);border-radius:12px;font-size:19px;font-weight:700}
    .hero{background:linear-gradient(rgba(21,59,87,.92),rgba(21,59,87,.92));color:#fff;padding:40px 0}.hero h1{margin:0;font-size:clamp(32px,5vw,54px)}.hero p{font-size:20px;color:#dbe7ee;margin:10px 0 0}
    .section{padding:40px 0}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.card{background:#fff;border-radius:20px;padding:20px;border:1px solid #ddd;box-shadow:var(--shadow)}.card h3{text-align:center;font-size:28px;margin:6px 0 10px}.card p{text-align:center;font-size:18px;line-height:1.5;color:#666}.btn{display:block;text-align:center;background:var(--green);color:#fff;padding:16px;border-radius:12px;font-size:22px;font-weight:700}.back{display:inline-block;margin-bottom:22px;background:#fff;padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);font-weight:700}.empty{background:#fff;padding:22px;border-radius:16px;box-shadow:var(--shadow);font-size:20px}
    @media (max-width:960px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.brand-name{font-size:30px}}
    @media (max-width:720px){.header .wrap{flex-direction:column;align-items:flex-start}.nav{width:100%}.nav a{flex:1;text-align:center}.brand-name{font-size:28px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top"><div class="wrap"><div class="row"><a href="tel:+38160111222">📞 +381 60 111 222</a><a href="mailto:info@agrotrgovina.rs">✉ info@agrotrgovina.rs</a><a class="social" href="https://facebook.com" target="_blank" rel="noopener">f</a></div></div></div>
  <header class="header"><div class="wrap"><a href="index.html" class="brand"><span style="font-size:32px">⌂</span><span class="brand-name">Meni</span></a><nav class="nav"><a href="index.html">Glavna</a><a href="kontakt.html">Kontakt</a></nav></div></header>
  <section class="hero"><div class="wrap"><h1>Rezultati pretrage</h1><p id="subtitle"></p></div></section>
  <section class="section"><div class="wrap"><a class="back" href="index.html">← Nazad na početnu</a><div id="content"></div></div></section>
  <script>
    const products = [
      {name:'Reverzibilni plug 3 brazde', type:'Mašina', link:'masine-kategorija.html?kategorija=plugovi'},
      {name:'Podrivač 5 tela', type:'Mašina', link:'masine-kategorija.html?kategorija=podrivaci'},
      {name:'Setvospremač 3m', type:'Mašina', link:'masine-kategorija.html?kategorija=setvospremaci'},
      {name:'Nož pluga', type:'Deo', link:'delovi-pregled.html?masina=plug'},
      {name:'Raonik', type:'Deo', link:'delovi-pregled.html?masina=plug'},
      {name:'Disk za tanjiraču', type:'Deo', link:'delovi-pregled.html?masina=tanjiracu'},
      {name:'Filter ulja', type:'Deo', link:'delovi-pregled.html?masina=traktor'}
    ];
    const q = (new URLSearchParams(location.search).get('q') || '').toLowerCase();
    document.getElementById('subtitle').textContent = q ? `Prikaz rezultata za: ${q}` : 'Niste uneli pojam za pretragu.';
    const result = products.filter(p => p.name.toLowerCase().includes(q));
    const content = document.getElementById('content');
    if(!q || !result.length){
      content.innerHTML = `<div class="empty">Nema rezultata za unetu pretragu. Pokušajte sa drugim nazivom ili otvorite kategorije proizvoda.</div>`;
    }else{
      content.innerHTML = `<div class="grid">${result.map(item => `<article class="card"><h3>${item.name}</h3><p>Tip: ${item.type}</p><a class="btn" href="${item.link}">Otvori</a></article>`).join('')}</div>`;
    }
  </script>
</body>
</html>
