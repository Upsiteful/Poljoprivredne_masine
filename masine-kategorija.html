<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro Trgovina | Kategorija mašina</title>
  <style>
    :root{--green:#18833b;--blue:#153b57;--bg:#efefef;--shadow:0 8px 20px rgba(0,0,0,.08);--container:min(1180px,92vw)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#222}a{text-decoration:none;color:inherit}.wrap{width:var(--container);margin:0 auto}
    .top{background:#fff;padding:10px 0;border-bottom:1px solid #e7e7e7}.row{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;font-size:18px}.social{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--green);color:#fff;border-radius:50%;font-weight:700}.header{background:var(--green);position:sticky;top:0}.header .wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:16px}.brand{display:flex;align-items:center;gap:14px;color:#fff}.brand-name{font-size:40px;font-weight:700}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#fff;padding:14px 22px;border:2px solid rgba(255,255,255,.35);border-radius:12px;font-size:19px;font-weight:700}
    .hero{background:linear-gradient(rgba(21,59,87,.92),rgba(21,59,87,.92));color:#fff;padding:40px 0}.hero h1{margin:0;font-size:clamp(34px,5vw,58px)}.hero p{font-size:20px;color:#dbe7ee;margin:10px 0 0}
    .section{padding:40px 0}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.card{background:#fff;border-radius:20px;padding:18px;border:1px solid #ddd;box-shadow:var(--shadow)}.card img{width:100%;height:240px;object-fit:contain;background:#fafafa;border-radius:14px}.card h3{text-align:center;font-size:28px;margin:16px 0 12px}.btn{display:block;text-align:center;background:var(--green);color:#fff;padding:16px;border-radius:12px;font-size:22px;font-weight:700}.back{display:inline-block;margin-bottom:22px;background:#fff;padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);font-weight:700}.floating-call{position:fixed;right:16px;bottom:16px;width:76px;height:76px;border-radius:22px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:38px;box-shadow:0 12px 24px rgba(0,0,0,.22)}
    @media (max-width:960px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.brand-name{font-size:30px}}
    @media (max-width:720px){.header .wrap{flex-direction:column;align-items:flex-start}.nav{width:100%}.nav a{flex:1;text-align:center}.brand-name{font-size:28px}.grid{grid-template-columns:1fr}.card h3{font-size:24px}}
  </style>
</head>
<body>
  <div class="top"><div class="wrap"><div class="row"><a href="tel:+38160111222">📞 +381 60 111 222</a><a href="mailto:info@agrotrgovina.rs">✉ info@agrotrgovina.rs</a><a class="social" href="https://facebook.com" target="_blank" rel="noopener">f</a></div></div></div>
  <header class="header"><div class="wrap"><a href="index.html" class="brand"><span style="font-size:32px">⌂</span><span class="brand-name">Meni</span></a><nav class="nav"><a href="index.html">Glavna</a><a href="kontakt.html">Kontakt</a></nav></div></header>
  <section class="hero"><div class="wrap"><h1 id="title">Kategorija mašina</h1><p>Pregled modela u okviru izabrane kategorije.</p></div></section>
  <section class="section"><div class="wrap"><a class="back" href="masine.html">← Nazad na kategorije mašina</a><div class="grid" id="grid"></div></div></section>
  <a class="floating-call" href="tel:+38160111222">📞</a>
  <script>
    const db = {
      plugovi:[
        {name:'Reverzibilni plug 3 brazde', img:'https://images.unsplash.com/photo-1592982537447-6f2a6a0f3b2d?auto=format&fit=crop&w=900&q=80'},
        {name:'Reverzibilni plug 4 brazde', img:'https://images.unsplash.com/photo-1523741543316-beb7fc7023d8?auto=format&fit=crop&w=900&q=80'},
        {name:'Nošeni plug', img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=900&q=80'}
      ],
      podrivaci:[
        {name:'Podrivač 5 tela', img:'https://images.unsplash.com/photo-1622383563227-04401ab4e5ea?auto=format&fit=crop&w=900&q=80'},
        {name:'Podrivač 7 tela', img:'https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=900&q=80'}
      ],
      setvospremaci:[
        {name:'Setvospremač 3m', img:'https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=900&q=80'},
        {name:'Setvospremač 5m', img:'https://images.unsplash.com/photo-1605000797499-95a51c5269ae?auto=format&fit=crop&w=900&q=80'}
      ],
      tanjirace:[{name:'Tanjirača teška', img:'https://images.unsplash.com/photo-1524486361537-8ad15938e1a3?auto=format&fit=crop&w=900&q=80'}],
      drljace:[{name:'Drljača klasična', img:'https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=900&q=80'}],
      prskalice:[{name:'Prskalica 600l', img:'https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=900&q=80'}],
      sejalice:[{name:'Sejalica pneumatska', img:'https://images.unsplash.com/photo-1574943320219-553eb213f72d?auto=format&fit=crop&w=900&q=80'}],
      rasturaci:[{name:'Rasturač đubriva', img:'https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&w=900&q=80'}]
    };
    const names = {plugovi:'Plugovi',podrivaci:'Podrivači',setvospremaci:'Setvospremači',tanjirace:'Tanjirače',drljace:'Drljače',prskalice:'Prskalice',sejalice:'Sejalice',rasturaci:'Rasturači đubriva'};
    const key = new URLSearchParams(location.search).get('kategorija') || 'plugovi';
    document.getElementById('title').textContent = names[key] || 'Kategorija mašina';
    const items = db[key] || [];
    document.getElementById('grid').innerHTML = items.map(i => `<article class="card"><img src="${i.img}" alt="${i.name}"><h3>${i.name}</h3><a class="btn" href="kontakt.html">Pošalji upit</a></article>`).join('');
  </script>
</body>
</html>
