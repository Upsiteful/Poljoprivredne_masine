<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro Trgovina | Delovi za mašine</title>
  <style>
    :root{--green:#18833b;--blue:#153b57;--bg:#efefef;--card:#fff;--shadow:0 8px 20px rgba(0,0,0,.08);--container:min(1180px,92vw)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#222}a{text-decoration:none;color:inherit}.wrap{width:var(--container);margin:0 auto}
    .top{background:#fff;padding:10px 0;border-bottom:1px solid #e7e7e7}.row{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;font-size:18px}.social{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--green);color:#fff;border-radius:50%;font-weight:700}.header{background:var(--green);position:sticky;top:0}.header .wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:16px}.brand{display:flex;align-items:center;gap:14px;color:#fff}.brand-name{font-size:40px;font-weight:700}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#fff;padding:14px 22px;border:2px solid rgba(255,255,255,.35);border-radius:12px;font-size:19px;font-weight:700}
    .hero{background:linear-gradient(rgba(21,59,87,.92),rgba(21,59,87,.92));color:#fff;padding:40px 0}.hero h1{margin:0;font-size:clamp(34px,5vw,58px)}.hero p{font-size:20px;color:#dbe7ee;margin:10px 0 0;max-width:70ch}
    .section{padding:40px 0}.title{font-size:clamp(30px,4vw,50px);margin:0 0 24px;color:var(--blue)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.tile{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:28px;min-height:160px;display:flex;align-items:center;justify-content:center;text-align:center;border:1px solid #ddd;font-size:28px;font-weight:700}.tile:hover{background:#f8fff9;border-color:#badac3}.floating-call{position:fixed;right:16px;bottom:16px;width:76px;height:76px;border-radius:22px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:38px;box-shadow:0 12px 24px rgba(0,0,0,.22)}
    @media (max-width:960px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.brand-name{font-size:30px}}
    @media (max-width:720px){.grid{grid-template-columns:1fr 1fr}.header .wrap{flex-direction:column;align-items:flex-start}.nav{width:100%}.nav a{flex:1;text-align:center}.brand-name{font-size:28px}.tile{font-size:21px;padding:18px;min-height:120px}}
    @media (max-width:480px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top"><div class="wrap"><div class="row"><a href="tel:+38160111222">📞 +381 60 111 222</a><a href="mailto:info@agrotrgovina.rs">✉ info@agrotrgovina.rs</a><a class="social" href="https://facebook.com" target="_blank" rel="noopener">f</a></div></div></div>
  <header class="header"><div class="wrap"><a href="index.html" class="brand"><span style="font-size:32px">⌂</span><span class="brand-name">Meni</span></a><nav class="nav"><a href="index.html">Glavna</a><a href="kontakt.html">Kontakt</a></nav></div></header>
  <section class="hero"><div class="wrap"><h1>Delovi za poljoprivredne mašine</h1><p>Prvo izaberite za koju mašinu tražite deo. Posle toga otvara se novo grananje sa tipovima delova, a zatim stranica sa proizvođačima.</p></div></section>
  <section class="section"><div class="wrap"><h2 class="title">Izaberite vrstu mašine</h2><div class="grid" id="partsGrid"></div></div></section>
  <a class="floating-call" href="tel:+38160111222">📞</a>
  <script>
    const machines = [
      {key:'plug', name:'Delovi za plug'},
      {key:'traktor', name:'Delovi za traktor'},
      {key:'podrivac', name:'Delovi za podrivač'},
      {key:'tanjiracu', name:'Delovi za tanjiraču'},
      {key:'sejalicu', name:'Delovi za sejalicu'},
      {key:'prskalicu', name:'Delovi za prskalicu'}
    ];
    document.getElementById('partsGrid').innerHTML = machines.map(item => `<a class="tile" href="delovi-pregled.html?masina=${item.key}">${item.name}</a>`).join('');
  </script>
</body>
</html>
